<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>Page builder</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar" aria-label="Project actions">
        <h1 class="visually-hidden">Page builder</h1>
        <div class="project-title-field">
          <label for="project-title-input" class="visually-hidden">Project title</label>
          <input id="project-title-input" class="project-title-input" type="text" value="Untitled page" maxlength="120" required aria-label="Project title">
        </div>
        <p id="status" class="status" role="status" aria-live="polite">Ready</p>
        <span id="save-state" class="save-state" data-state="saved" aria-live="polite">Saved</span>
        <nav class="actions" aria-label="Project actions">
          <button id="load-project" class="button button-secondary" type="button" disabled>Load project</button>
          <button id="save-project" class="button button-secondary" type="button">Save project</button>
          <button id="publish-project" class="button button-primary" type="button">Publish project</button>
          <a id="open-published" class="button button-link" href="#" target="_blank" rel="noopener" hidden>Open published page</a>
        </nav>
      </header>

      <div class="workbench">
        <aside class="control-rail" aria-label="Project and block controls">
          <section class="panel-section" aria-labelledby="project-title">
            <div class="section-heading">
              <span class="section-index" aria-hidden="true">01</span>
              <h2 id="project-title">Project</h2>
            </div>
            <div class="field-stack">
              <label for="project-name">Project name</label>
              <input id="project-name" name="project-name" type="text" value="Untitled page" maxlength="120" required>
            </div>
            <div class="field-stack">
              <label for="project-slug">Project slug</label>
              <input id="project-slug" name="project-slug" type="text" value="untitled-page" maxlength="80" pattern="[a-z0-9]+(?:-[a-z0-9]+)*" required>
            </div>
          </section>

          <section class="panel-section palette-section" aria-labelledby="palette-title">
            <div class="section-heading">
              <span class="section-index" aria-hidden="true">02</span>
              <h2 id="palette-title">Palette</h2>
            </div>
            <div id="palette" class="palette">
              <button type="button" draggable="true" data-palette-type="heading">Heading</button>
              <button type="button" draggable="true" data-palette-type="text">Text</button>
              <button type="button" draggable="true" data-palette-type="button">Button</button>
              <button type="button" draggable="true" data-palette-type="section">Section</button>
              <button type="button" draggable="true" data-palette-type="divider">Divider</button>
              <button type="button" draggable="true" data-palette-type="quote">Quote</button>
              <button type="button" draggable="true" data-palette-type="image">Image</button>
              <button type="button" draggable="true" data-palette-type="spacer">Spacer</button>
            </div>
            <p id="block-count" class="block-count" aria-live="polite">0 / 20 blocks</p>
          </section>
        </aside>

        <main class="workspace" aria-labelledby="canvas-title">
          <div class="workspace-heading">
            <h2 id="canvas-title">Canvas</h2>
            <div class="editor-modes" role="group" aria-label="Editor mode">
              <button id="mode-edit" class="button button-secondary editor-mode" type="button" aria-pressed="true">Edit</button>
              <button id="mode-preview" class="button button-secondary editor-mode" type="button" aria-pressed="false">Preview</button>
            </div>
            <div class="preview-modes" role="group" aria-label="Preview mode">
              <button id="preview-desktop" class="button button-secondary preview-mode" type="button" aria-pressed="true">Desktop</button>
              <button id="preview-mobile" class="button button-secondary preview-mode" type="button" aria-pressed="false">Mobile</button>
            </div>
          </div>
          <div id="canvas" class="canvas" aria-describedby="canvas-help">
            <div id="canvas-help" class="canvas-placeholder" role="note" aria-label="Empty canvas">
              <p class="canvas-empty-text">Your page has no blocks yet. Add one from the palette to get started.</p>
              <button id="add-first-block" class="button button-secondary" type="button">Add your first block</button>
            </div>
          </div>
        </main>

        <aside class="inspector" aria-labelledby="inspector-title">
          <div class="section-heading inspector-heading">
            <span class="section-index" aria-hidden="true">03</span>
            <h2 id="inspector-title">Inspector</h2>
            <button id="inspector-toggle" class="button button-secondary inspector-toggle" type="button" aria-expanded="true" aria-controls="inspector-fields">Collapse</button>
          </div>
          <div id="inspector-fields" class="inspector-fields">
            <p class="muted-copy">Select a block to edit its content.</p>
          </div>
          <div class="reorder-actions" aria-label="Reorder selected block">
            <button id="move-selected-up" class="button button-secondary" type="button" disabled>Move up</button>
            <button id="move-selected-down" class="button button-secondary" type="button" disabled>Move down</button>
          </div>
          <button id="duplicate-selected" class="button button-secondary remove-button" type="button" disabled>Duplicate selected</button>
          <button id="remove-selected" class="button button-danger remove-button" type="button" disabled>Remove selected</button>
        </aside>
      </div>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
